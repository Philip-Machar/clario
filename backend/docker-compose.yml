version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: clario_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clario
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: clario_backend
    restart: always
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: clario
      PORT: 8080
      JWT_SECRET: xxx
      GEMINI_API_KEY: xxx
    ports:
      - "8080:8080"

volumes:
  postgres_data: